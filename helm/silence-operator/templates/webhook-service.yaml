{{- if .Values.webhook.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: {{ template "silence-operator.name" . }}-webhook
  namespace: {{ template "silence-operator.namespace" . }}
spec:
  ports:
  - name: webhook
    port: 443
    protocol: TCP
    targetPort: webhook
  selector:
    {{- include "labels.selector" . | nindent 4 }}
{{- end }}
