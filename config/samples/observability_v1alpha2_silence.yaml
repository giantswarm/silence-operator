apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: my-sample-silence
  namespace: default
spec:
  matchers:
  - name: alertname
    value: MyPagingAlert
    matchType: "="
  - name: alertname
    value: Heartbeat
    matchType: "!="
---
# Example: schedule an upcoming maintenance window with exact timestamps.
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: scheduled-maintenance-silence
  namespace: default
spec:
  startsAt: "2025-07-16T02:00:00Z"
  endsAt: "2025-07-16T06:00:00Z"
  matchers:
  - name: alertname
    value: ".*Disk.*"
    matchType: "=~"
  - name: job
    value: node-exporter
    matchType: "="
---
# Example: silence active from creation for a fixed duration.
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: incident-response-silence
  namespace: default
spec:
  duration: "2h30m"
  matchers:
  - name: severity
    value: "warning|info"
    matchType: "=~"
  - name: team
    value: platform
    matchType: "="
